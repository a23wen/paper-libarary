{{- define "main" }}

<header class="page-header search-header">
    <h1>{{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
    <div class="post-description">
        输入论文标题、作者、会议、年份、分类或阅读状态来检索笔记。
    </div>
    {{- if not (.Param "hideMeta") }}
    <div class="post-meta">
        {{- partial "translation_list.html" . -}}
    </div>
    {{- end }}
</header>

<div id="searchbox" class="paper-searchbox">
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default "搜索 DeepSeek / NeurIPS / 自然语言处理 / completed" }}"
        aria-label="搜索论文和笔记" type="search" autocomplete="off" maxlength="64">
    <p class="paper-search-hint">支持标题、摘要、分类、作者、会议、年份和状态。</p>
    <ul id="searchResults" aria-label="搜索结果"></ul>
</div>

{{- end }}{{/* end main */}}
